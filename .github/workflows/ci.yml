name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ubuntu-gcc:
    name: Ubuntu GCC
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Check public headers
        run: ./scripts/check_public_headers.sh build

      - name: Check backend leaks
        run: ./scripts/check_no_backend_leaks.sh

  ubuntu-clang:
    name: Ubuntu Clang
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libx11-dev

      - name: Configure
        run: cmake -S . -B build-clang -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-clang --parallel

      - name: Run tests
        run: ctest --test-dir build-clang --output-on-failure

      - name: Check public headers
        run: ./scripts/check_public_headers.sh build-clang

      - name: Check backend leaks
        run: ./scripts/check_no_backend_leaks.sh
